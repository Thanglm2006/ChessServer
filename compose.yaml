services:
  db:
    image: groonga/pgroonga:3.2.4-alpine-17
    container_name: chess_db
    environment:
      POSTGRES_DB: chess_db
      POSTGRES_USER: Thanglm2006
      POSTGRES_PASSWORD: Thanglm2006
    ports:
      - "5473:5432"
    volumes:
      - data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Thanglm2006 -d chess_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chess_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: chess_backend
    network_mode: "host"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://localhost:5473/chess_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-Thanglm2006}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-Thanglm2006}

      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST:-localhost}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT:-6379}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-599331175768-2rk7fdpri16ncb3iu3sbful0hslehdq7.apps.googleusercontent.com}
      AI_API_URL: http://localhost:3210/api
volumes:
  data: